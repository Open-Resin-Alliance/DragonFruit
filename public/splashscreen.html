<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DragonFruit</title>
  <style>
    :root {
      /* Matches scene/thumbnail defaults from themeCustomizations.ts */
      --scene-gradient-radial: #ff37aa;
      --scene-gradient-linear-start: #ff37aa;
      --scene-gradient-linear-mid: #6f33ff;
      --splash-base: #0b0f14;
      --splash-accent: #baf72e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      -webkit-app-region: drag;
      background:
        radial-gradient(
          circle at 50% 46%,
          rgba(0, 0, 0, 0) 56%,
          rgba(255, 55, 170, 0.045) 100%
        ),
        linear-gradient(
          to bottom,
          rgba(255, 55, 170, 0.03) 0%,
          rgba(111, 51, 255, 0.03) 40%,
          rgba(0, 0, 0, 0) 100%
        ),
        var(--splash-base);
    }

    .ambient {
      position: fixed;
      inset: -12%;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 24%, rgba(255, 55, 170, 0.07), transparent 48%),
        radial-gradient(circle at 78% 76%, rgba(111, 51, 255, 0.06), transparent 46%);
      filter: blur(28px);
      animation: drift 14s ease-in-out infinite alternate;
      opacity: 0.55;
    }

    @keyframes drift {
      0% {
        transform: translate3d(-3px, -2px, 0) scale(1);
      }
      100% {
        transform: translate3d(3px, 2px, 0) scale(1.01);
      }
    }

    .splash {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 18px;
    }

    .logo {
      width: 108px;
      height: 108px;
      animation:
        logoEnter 0.6s cubic-bezier(0.22, 1, 0.36, 1) both,
        logoPulse 2.5s ease-in-out 0.6s infinite;
      pointer-events: none;
      filter: drop-shadow(0 0 12px rgba(255, 55, 170, 0.07));
    }

    @keyframes logoEnter {
      from {
        opacity: 0;
        transform: scale(0.88);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes logoPulse {
      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.93;
        transform: scale(0.985);
      }
    }

    .wordmark {
      width: 232px;
      height: auto;
      pointer-events: none;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.35));
      animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.28s both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 0.95;
        transform: translateY(0);
      }
    }

    .divider {
      width: 36px;
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 1px;
      animation: fadeIn 0.4s ease-out 0.48s both;
      margin-top: -4px;
    }

    .loader {
      display: flex;
      gap: 7px;
      align-items: center;
      animation: fadeIn 0.4s ease-out 0.58s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--splash-accent);
      box-shadow: 0 0 6px rgba(186, 247, 46, 0.18);
      animation: dotPulse 1.35s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }

    @keyframes dotPulse {
      0%,
      70%,
      100% {
        opacity: 0.22;
        transform: scale(0.78);
      }
      35% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <div class="splash">
    <img
      class="logo"
      src="/dragonfruit_assets/branding/simple_icon.svg"
      alt="DragonFruit"
      draggable="false"
    />
    <img
      class="wordmark"
      src="/dragonfruit_assets/branding/text_logo.svg"
      alt="DragonFruit"
      draggable="false"
    />

    <div class="divider" aria-hidden="true"></div>

    <div class="loader" aria-label="Loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
