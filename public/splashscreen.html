<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DragonFruit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      -webkit-app-region: drag;
      background: linear-gradient(165deg, #14061b 0%, #0d1a0d 100%);
    }

    /* ── Layout ── */

    .splash {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 28px 0 22px;
    }

    /* ── Logo ── */

    .logo-wrap {
      position: relative;
      flex: 0 0 auto;
    }

    .logo {
      width: 132px;
      height: 132px;
      display: block;
      opacity: 0;
      filter: drop-shadow(0 0 6px rgba(252, 43, 113, 0.10));
      animation: logoIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes logoIn {
      0%   { opacity: 0; transform: scale(0.85) translateY(4px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Wordmark ── */

    .wordmark {
      width: 250px;
      height: auto;
      display: block;
      margin-top: 14px;
      opacity: 0;
      animation: wordmarkIn 0.45s ease-out 0.2s forwards;
    }

    @keyframes wordmarkIn {
      0%   { opacity: 0; transform: translateY(4px); }
      100% { opacity: 0.92; transform: translateY(0); }
    }

    /* ── Loading bar ── */

    .bar-track {
      position: relative;
      width: 80px;
      height: 2px;
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin-top: 20px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.3s ease-out 0.45s forwards;
    }

    .bar-fill {
      height: 100%;
      width: 100%;
      border-radius: 1px;
      background: linear-gradient(90deg, #fc2b71, #baf72e);
      transform-origin: left;
      animation: load 1.2s ease-in-out 0.55s infinite;
      transform: scaleX(0);
    }

    @keyframes load {
      0%   { transform: scaleX(0); transform-origin: left; }
      50%  { transform: scaleX(1); transform-origin: left; }
      51%  { transform: scaleX(1); transform-origin: right; }
      100% { transform: scaleX(0); transform-origin: right; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Version ── */

    .version {
      position: absolute;
      bottom: 14px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.14);
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 0.4s ease-out 0.8s forwards;
      visibility: hidden;
    }
    .version.visible { visibility: visible; }

    /* ── Fade-out on close ── */

    body.fade-out {
      transition: opacity 0.18s ease-out;
      opacity: 0;
    }
  </style>
</head>
