name: PR macOS build check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  macos-build:
    name: macOS compile check (Universal)
    runs-on: macos-latest
    permissions:
      actions: write
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_hash: ${{ steps.version.outputs.commit_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Check for Apple signing secret
        id: apple_cert
        shell: bash
        run: echo "available=${{ secrets.APPLE_CERTIFICATE != '' }}" >> "$GITHUB_OUTPUT"

      - name: Install Apple Certificate
        if: steps.apple_cert.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASS }}

      - name: Fall back to ad-hoc signing if Developer ID cert is unavailable
        shell: bash
        run: |
          if ! security find-identity -v -p codesigning 2>/dev/null | grep -q "Developer ID Application: Pascal Krumme (MHNF3GA2MM)"; then
            echo "⚠️ Developer ID certificate not found in keychain — falling back to ad-hoc signing"
            node -e "
              const fs = require('fs');
              const p = 'src-tauri/tauri.macos.conf.json';
              const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
              cfg.bundle.macOS.signingIdentity = '-';
              fs.writeFileSync(p, JSON.stringify(cfg, null, 2) + '\n');
            "
          else
            echo "✅ Developer ID certificate available — using full codesigning"
          fi

      - name: Export Apple Team ID for notarization
        run: echo "APPLE_TEAM_ID=MHNF3GA2MM" >> "$GITHUB_ENV"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./rust/dragonfruit-voxl-thumbnail -> target
          shared-key: tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Derive version info
        id: version
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "commit_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Export Apple notarization credentials for nightly builds
        if: contains(github.event.pull_request.labels.*.name, 'nightly-build')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=MHNF3GA2MM" >> "$GITHUB_ENV"

      - name: Generate plugin registry
        run: node scripts/generate-plugin-registry.mjs

      - name: Check for Tauri updater signing secret
        id: tauri_signing
        shell: bash
        run: echo "available=${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - name: Export Tauri updater signing key
        # Tauri updater signing — set these as repo secrets:
        # TAURI_SIGNING_PRIVATE_KEY — content of .tauri/app.key
        # TAURI_SIGNING_PRIVATE_KEY_PASSWORD — optional password set during key gen
        # Only exported when present: tauri-action treats the env var as
        # "signing enabled" merely by being set, even to an empty string,
        # so an unavailable secret (e.g. fork PRs) must leave it unset
        # rather than exported empty.
        if: steps.tauri_signing.outputs.available == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<TAURI_SIGNING_PRIVATE_KEY_EOF"
            echo "$TAURI_SIGNING_PRIVATE_KEY"
            echo "TAURI_SIGNING_PRIVATE_KEY_EOF"
          } >> "$GITHUB_ENV"
          {
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<TAURI_SIGNING_PRIVATE_KEY_PASSWORD_EOF"
            echo "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD_EOF"
          } >> "$GITHUB_ENV"

      - name: Build Tauri universal macOS bundle
        uses: tauri-apps/tauri-action@v0
        env:
          CMAKE_OSX_ARCHITECTURES: "arm64;x86_64"
          DF_BUILD_TARGET_TRIPLE: universal-apple-darwin
        with:
          tauriScript: npx tauri
          args: --target universal-apple-darwin --bundles app,dmg

      - name: Embed QuickLook extension + verify universal bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: MHNF3GA2MM
        run: |
          node scripts/macos-embed-appex.mjs --target universal-apple-darwin
          node scripts/verify-universal-bundle.mjs

      - name: Rename DMG for nightly handoff
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_HASH: ${{ steps.version.outputs.commit_hash }}
        run: |
          nightly_tag="pr-${COMMIT_HASH}_${VERSION}_DragonFruit_nightly"

          for f in src-tauri/target/*/release/bundle/dmg/*.dmg; do
            [ -e "$f" ] && mv -v "$f" "$(dirname "$f")/${nightly_tag}.dmg"
          done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: src-tauri/target/*/release/bundle/dmg/*_DragonFruit_nightly.dmg
          if-no-files-found: error
