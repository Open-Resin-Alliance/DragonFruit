name: Warm Rust cache

on:
  push:
    branches:
      - main
      - dev
    paths:
      - src-tauri/**
      - rust/**
      - rust-toolchain.toml
  workflow_dispatch:

concurrency:
  group: warm-rust-cache-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  warm-macos:
    name: Warm macOS Rust cache
    runs-on: macos-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: tauri

      - name: Generate plugin registry
        run: node scripts/generate-plugin-registry.mjs

      - name: Compile Rust dependencies
        working-directory: src-tauri
        env:
          CMAKE_OSX_ARCHITECTURES: "arm64;x86_64"
          DF_BUILD_TARGET_TRIPLE: universal-apple-darwin
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
