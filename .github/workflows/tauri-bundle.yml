name: Build Tauri Bundles

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        run: npm run tauri:bundle:windows

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: dragonfruit-windows-x64
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (Linux)
        run: npm run tauri:bundle:linux

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: dragonfruit-linux-x64
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/
          if-no-files-found: warn

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (macOS x64)
        run: npm run tauri:bundle:macos

      - name: Upload macOS x64 bundle
        uses: actions/upload-artifact@v4
        with:
          name: dragonfruit-macos-x64
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/
          if-no-files-found: warn

  build-macos-arm64:
    runs-on: macos-latest-xlarge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (macOS arm64)
        run: npm run tauri:bundle:macos:arm64

      - name: Upload macOS arm64 bundle
        uses: actions/upload-artifact@v4
        with:
          name: dragonfruit-macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/
          if-no-files-found: warn

  create-release:
    needs: [build-windows, build-linux, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dragonfruit-windows-x64/**/*
            dragonfruit-linux-x64/**/*
            dragonfruit-macos-x64/**/*
            dragonfruit-macos-arm64/**/*
          draft: true
          prerelease: false
